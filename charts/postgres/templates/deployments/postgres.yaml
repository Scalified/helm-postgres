apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postgres.fullname" $ }}
  labels: {{- include "postgres.labels" $ | nindent 4 }}
spec:
  {{- with .Values.postgres }}
  {{- $postgres := . }}
  replicas: {{ .replicaCount | default 1 }}
  strategy:
    type: Recreate
  selector:
    matchLabels: {{- include "postgres.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      {{- if .annotations }}
      annotations: {{- toYaml .annotations | nindent 8 }}
      {{- end }}
      labels: {{- include "postgres.selectorLabels" $ | nindent 8 }}
    spec:
      containers:
        {{- with .containers.postgres }}
        - name: {{ $.Chart.Name }}
          {{- with .image }}
          image: "{{ .repository }}:{{ .tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ .pullPolicy | default "IfNotPresent" }}
          {{- end }}
          {{- if .command }}
          command: {{- toYaml .command | nindent 12 }}
          {{- end }}
          {{- if .args }}
          args: {{- toYaml .args | nindent 12 }}
          {{- end }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.fullname" $ }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.fullname" $ }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ $postgres.db | default "postgres" | quote }}
          {{- if .env }}
            {{- toYaml .env | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -d \"$POSTGRES_DB\" -U \"$POSTGRES_USER\""]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -d \"$POSTGRES_DB\" -U \"$POSTGRES_USER\""]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          {{- if .resources }}
          resources: {{- toYaml .resources | nindent 12 }}
          {{- end }}
          {{- if .volumeMounts }}
          volumeMounts: {{- toYaml .volumeMounts | nindent 12 }}
          {{- end }}
        {{- end }}
      hostname: {{ .hostname | default "postgres" }}
      restartPolicy: Always
      {{- if .volumes }}
      volumes: {{- toYaml .volumes | nindent 8 }}
      {{- end }}
  {{- end }}
